<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Restaurante App</title>
        <style>
            body { font-family: Arial, sans-serif; background: #f9f9f9;
            display: flex; justify-content: center; padding: 40px; }
            .card { background: white; border-radius: 12px; padding: 30px;
            box-shadow: 0 4px 12px rgba(0,0,0,.1); max-width: 420px; width: 100%; }
            h1 { color: #c0392b; text-align: center; margin-bottom: 20px; }
            ul { list-style: none; padding: 0; }
            li { display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid #eee; font-size: 1rem; }
            .price{ font-weight: bold; color: #27ae60; }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Menu del Restaurante</h1>
            <ul>
                <li><span>Pizza Margarita</span> <span class="price">$120</span></li>
                <li><span>Hamburguesa Clasica</span><span class="price">$90</span></li>
                <li><span>Tacos de Carnitas</span> <span class="price">$70</span></li>
                <li><span>Ensalada del Chef</span> <span class="price">$65</span></li>
                <li><span>Refresco</span> <span class="price">$25</span></li>
            </ul>
        </div>
    </body>
</html>
